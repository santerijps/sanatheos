pre-commit:
  parallel: true
  commands:
    lint:
      run: bunx oxlint src/ tests/ scripts/
    fmt-check:
      run: bunx oxfmt --check src/ tests/ scripts/
    typecheck:
      run: bunx tsc --noEmit
    test:
      run: bun test

pre-push:
  commands:
    test:
      run: bun test
    test-e2e:
      run: bun test:e2e
